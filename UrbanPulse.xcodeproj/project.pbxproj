			shellPath = /bin/sh;
			shellScript = "set -eu\n\nread_setting() {\n    file=\"$1\"\n    setting=\"$2\"\n\n    if [ ! -f \"$file\" ]; then\n        return 0\n    fi\n\n    line=$(/usr/bin/grep -E \"^[[:space:]]*$setting[[:space:]]*=\" \"$file\" | /usr/bin/tail -n 1 || true)\n    if [ -z \"$line\" ]; then\n        return 0\n    fi\n\n    value=${line#*=}\n    value=$(printf '%s' \"$value\" | /usr/bin/sed 's/^[[:space:]]*//; s/[[:space:]]*$//')\n    printf '%s' \"$value\"\n}\n\ncopy_if_present() {\n    source_file=\"$1\"\n    destination_file=\"$2\"\n\n    if [ -f \"$source_file\" ]; then\n        /bin/cp \"$source_file\" \"$destination_file\"\n    fi\n}\n\nGOOGLE_MAPS_KEY=$(read_setting \"$PROJECT_DIR/Config/GoogleMaps.xcconfig\" \"GOOGLE_MAPS_API_KEY\")\nif [ -z \"$GOOGLE_MAPS_KEY\" ]; then\n    GOOGLE_MAPS_KEY=$(read_setting \"$PROJECT_DIR/Config/Secrets.xcconfig\" \"GOOGLE_MAPS_API_KEY\")\nfi\n\nCENSUS_KEY=$(read_setting \"$PROJECT_DIR/Config/Secrets.xcconfig\" \"CENSUS_API_KEY\")\nINFO_PLIST=\"$TARGET_BUILD_DIR/$INFOPLIST_PATH\"\nRESOURCES_DIR=\"$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH\"\n\n/usr/libexec/PlistBuddy -c \"Set :GoogleMapsAPIKey $GOOGLE_MAPS_KEY\" \"$INFO_PLIST\" 2>/dev/null || /usr/libexec/PlistBuddy -c \"Add :GoogleMapsAPIKey string $GOOGLE_MAPS_KEY\" \"$INFO_PLIST\"\n/usr/libexec/PlistBuddy -c \"Set :CensusAPIKey $CENSUS_KEY\" \"$INFO_PLIST\" 2>/dev/null || /usr/libexec/PlistBuddy -c \"Add :CensusAPIKey string $CENSUS_KEY\" \"$INFO_PLIST\"\n\n/bin/mkdir -p \"$RESOURCES_DIR\"\ncopy_if_present \"$PROJECT_DIR/Config/GoogleMaps.xcconfig\" \"$RESOURCES_DIR/GoogleMaps.xcconfig\"\ncopy_if_present \"$PROJECT_DIR/Config/Secrets.xcconfig\" \"$RESOURCES_DIR/Secrets.xcconfig\"\n";
